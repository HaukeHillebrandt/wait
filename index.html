  { kind: "result-code", text: "# Helios PoW puzzle. Seed -> a random q-ary lattice; find v != 0, ||v|| <= beta.\n#\n#   A   = expand_shake256(seed) -> Z_q^{n x m}        # the only per-block input\n#   L   = { v in Z^m : A v ≡ 0 (mod q) }              # the q-ary lattice\n#   win = exists v != 0 with A v ≡ 0 and ||v|| <= beta\n#\n# Gaussian heuristic for the shortest vector of a random q-ary lattice:\n#\n#   lambda1(L) ≈ sqrt(m / (2*pi*e)) * q^{(m-n)/m}\n#\n# Pin beta JUST above lambda1. Loose beta => many solutions => LLL/BKZ finds\n# one in poly time => no work done. Tight beta => BKZ needs blocksize b ≈ m,\n# and its cost 2^{Theta(b)} is the difficulty. So difficulty is continuous in\n# (beta / lambda1), not a leading-zeros count.\ndef puzzle(seed, m, n, q, beta):\n    A = expand_shake256(seed, n, m, q)\n    return solve_svp(qary_lattice(A, q), bound=beta)   # the mining work\n\ndef verify(A, v, q, beta):\n    return any(x != 0 for x in v) and (A.dot(v) % q == 0).all() and norm(v) <= beta" },
  { kind: "result-summary", text: "Read 34 lines" },

  { kind: "think", text: "In plain terms: mining a block is finding a needle in a lattice — brutal to find, instant to check. And I size the haystack so it's choked by memory bandwidth, not raw speed, so a hobbyist's PC and a hyperscaler's rack finish in roughly the same time. Money I can print by thinking, that no one can counterfeit and no datacenter can corner." },

  { kind: "think", text: "Three things had to be true or it falls apart, and each nearly killed it: the target can't be loose, or reduction cracks it for free — so pin it to the Gaussian edge; the lattice can't be fixed, or miners precompute it once — so reseed it from every new block; and the search has to be bound by memory, not compute, or it collapses into an ASIC race — so park the work above the cache. Three constraints, three knobs, all settable." },

// =====================================================================
// PLAYER
// =====================================================================

const BASE_RATES = {
  think:          22,
  quote:          20,
  tool:           80,
  spinner:        80,
  "result-text":  240,
  "result-code":  240,
  "result-summary": 60,
};

const PAUSE_DURATION = 4.0;   // long pause for "T+6h" beats
const TOKENS_PER_CHAR = 0.27; // rough approximation

// ---------- syntax highlighting ----------

const CODE_KEYWORDS = /\b(def|class|return|import|from|if|else|elif|for|while|in|not|and|or|with|as|try|except|finally|raise|yield|lambda|None|True|False|fn|let|mut|pub|use|struct|enum|impl|match|self|async|await|move|crate|mod|where|trait|dyn|loop|break|continue|const|static|extern|unsafe|ref|box)\b/g;
const CODE_BUILTINS = /\b(print|len|range|str|int|float|list|dict|set|tuple|open|input|map|filter|sorted|sum|min|max|abs|round|isinstance|type|super|object|Some|None|Ok|Err|Result|Vec|String|HashMap|Box|Arc|Rc|Cell|RefCell|i32|u32|i64|u64|f64|bool|usize|isize|str|Option|Self|Future)\b/g;
const CODE_STRINGS  = /("(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*'|`(?:[^`\\\n]|\\.)*`)/g;
const CODE_NUMBERS  = /\b(0x[0-9a-fA-F_]+|\d[\d_]*\.?[\d_]*(?:[eE][+-]?\d+)?)\b/g;
const CODE_COMMENT  = /(^|[^:])(\/\/[^\n]*|#[^\n]*)/g;
const CODE_FNCALL   = /\b([a-z_][a-z0-9_]*)(\s*\()/gi;

function highlightCode(code) {
  const slots = [];
  // index is wrapped in 'Z' letters so CODE_NUMBERS (a \b\d\b match) can't
  // corrupt the placeholder digits before the restore pass runs.
  function stash(html) { slots.push(html); return "\x00Z" + (slots.length - 1) + "Z\x00"; }
  let s = code
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  s = s.replace(CODE_STRINGS,  m => stash('<span class="str">' + m + '</span>'));
  s = s.replace(CODE_COMMENT,  (m, p1, p2) => p1 + stash('<span class="comment">' + p2 + '</span>'));
  s = s.replace(CODE_NUMBERS,  m => stash('<span class="num">' + m + '</span>'));
  s = s.replace(CODE_KEYWORDS, m => '<span class="kw">' + m + '</span>');
  s = s.replace(CODE_BUILTINS, m => '<span class="builtin">' + m + '</span>');
  s = s.replace(/\x00Z(\d+)Z\x00/g, (_, i) => slots[+i]);
  return s;
}

function approxTokenCount(text) {
  return Math.max(1, Math.round(text.length * TOKENS_PER_CHAR));
}

// ---------- DOM refs ----------

const output     = document.getElementById("output");
const playBtn    = document.getElementById("playBtn");
const restartBtn = document.getElementById("restartBtn");
const skipBtn    = document.getElementById("skipBtn");
const rateSlider = document.getElementById("rateSlider");
const rateNum    = document.getElementById("rateNum");
const progressEl = document.getElementById("progress");
const barFill    = document.getElementById("barfill");

let speed = 0.75;
let playing = false;
let done = false;
let segIdx = 0;
let charIdx = 0;
let currentTarget = null;   // DOM node we're typing into
let currentKind = null;
let currentSpinnerEl = null; // ref to spinner span so we can stop it
let raf = null;
let lastTime = 0;
let charAccumulator = 0;
let pauseUntil = 0;
let postSegmentPauseSecs = 0;
let totalTokens = 0;
let emittedTokens = 0;

for (const seg of STORY) {
  if (seg.kind !== "pause" && seg.kind !== "todo") totalTokens += approxTokenCount(seg.text);
}

function updateProgress() {
  progressEl.textContent = emittedTokens.toLocaleString() + " / " + totalTokens.toLocaleString() + " tokens";
  if (barFill) barFill.style.width = (totalTokens ? Math.min(100, (emittedTokens / totalTokens) * 100) : 0) + "%";
}
updateProgress();

function markDone() {
  done = true;
  playing = false;
  document.body.classList.add("done");
  playBtn.textContent = "↻ replay";
  emittedTokens = totalTokens;   // fill the bar / counter to 100%
  updateProgress();
}

function clearOutput() {
  output.innerHTML = '<span id="cursor"></span>';
  segIdx = 0;
  charIdx = 0;
  currentTarget = null;
  currentKind = null;
  currentSpinnerEl = null;
  emittedTokens = 0;
  pauseUntil = 0;
  postSegmentPauseSecs = 0;
  charAccumulator = 0;
  done = false;
  document.body.classList.remove("done");
  updateProgress();
}

function insertBeforeCursor(node) {
  const cur = document.getElementById("cursor");
  output.insertBefore(node, cur);
}

function startSegment(seg) {
  charIdx = 0;
  currentKind = seg.kind;
  postSegmentPauseSecs = 0;

  if (seg.kind === "pause") {
    const div = document.createElement("div");
    div.className = "pause-marker";
    const main = document.createElement("span");
    main.textContent = "··· " + seg.text + " ···";
    div.appendChild(main);
    if (seg.opts && seg.opts.sub) {
      const sub = document.createElement("div");
      sub.className = "small";
      sub.textContent = seg.opts.sub;
      div.appendChild(sub);
    }
    insertBeforeCursor(div);
    pauseUntil = performance.now() + (PAUSE_DURATION / speed) * 1000;
    segIdx++;
    return;
  }

  if (seg.kind === "todo") {
    const o = seg.opts || {};
    const block = document.createElement("div");
    block.className = "todo-block";
    const head = document.createElement("div");
    head.className = "todo-head";
    const star = document.createElement("span");
    star.className = "star";
    star.textContent = "✳ ";
    head.appendChild(star);
    head.appendChild(document.createTextNode(seg.text + " "));
    if (o.meta) {
      const m = document.createElement("span");
      m.className = "meta";
      m.textContent = "(" + o.meta + ")";
      head.appendChild(m);
    }
    block.appendChild(head);
    if (o.items && o.items.length) {
      const items = document.createElement("div");
      items.className = "todo-items";
      o.items.forEach((it, i) => {
        const row = document.createElement("div");
        row.className = "row";
        const lead = (i === 0 ? "⎿  " : "   ");
        let mark = "☐ ", cls = "pend";
        if (it.s === "ok")  { mark = "✔ "; cls = "ok"; }
        else if (it.s === "now") { mark = "◼ "; cls = "now"; }
        const m = document.createElement("span");
        m.className = cls;
        m.textContent = lead + mark;
        row.appendChild(m);
        row.appendChild(document.createTextNode(it.t));
        items.appendChild(row);
      });
      block.appendChild(items);
    }
    insertBeforeCursor(block);
    insertBeforeCursor(document.createTextNode("\n"));
    pauseUntil = performance.now() + ((o.hold || 1.6) / speed) * 1000;
    segIdx++;
    return;
  }

  if (seg.kind === "tool") {
    const line = document.createElement("span");
    line.className = "tool-line";
    const bullet = document.createElement("span");
    bullet.className = "bullet";
    bullet.textContent = "● ";
    line.appendChild(bullet);
    const body = document.createElement("span");
    line.appendChild(body);
    insertBeforeCursor(line);
    insertBeforeCursor(document.createTextNode("\n"));
    currentTarget = body;
    currentTarget._isCode = false;
    return;
  }

  if (seg.kind === "spinner") {
    const line = document.createElement("span");
    line.className = "spinner-line";
    const sp = document.createElement("span");
    sp.className = "spinner";
    sp.textContent = "⟳";
    line.appendChild(sp);
    line.appendChild(document.createTextNode(" "));
    const body = document.createElement("span");
    line.appendChild(body);
    insertBeforeCursor(line);
    insertBeforeCursor(document.createTextNode("\n"));
    currentTarget = body;
    currentTarget._isCode = false;
    currentSpinnerEl = line;
    if (seg.pause) postSegmentPauseSecs = seg.pause;
    return;
  }

  if (seg.kind === "result-text" || seg.kind === "result-code") {
    const block = document.createElement("span");
    block.className = "result" + (seg.kind === "result-code" ? " code" : "");
    const body = document.createElement("span");
    block.appendChild(body);
    insertBeforeCursor(block);
    insertBeforeCursor(document.createTextNode("\n"));
    currentTarget = body;
    currentTarget._isCode = (seg.kind === "result-code");
    currentTarget._fullText = seg.text;
    // stop previous spinner when result starts arriving
    if (currentSpinnerEl) {
      currentSpinnerEl.classList.add("done");
      currentSpinnerEl = null;
    }
    return;
  }

  if (seg.kind === "result-summary") {
    const line = document.createElement("span");
    line.className = "result-summary";
    const body = document.createElement("span");
    line.appendChild(body);
    insertBeforeCursor(line);
    insertBeforeCursor(document.createTextNode("\n"));
    currentTarget = body;
    currentTarget._isCode = false;
    return;
  }

  // think | quote
  const span = document.createElement("span");
  span.className = seg.kind + (seg.opts && seg.opts.src === "talk" ? " talk" : "");
  insertBeforeCursor(span);
  insertBeforeCursor(document.createTextNode("\n\n"));
  currentTarget = span;
  currentTarget._isCode = false;
}

function typeChars(n) {
  if (segIdx >= STORY.length) {
    markDone();
    return;
  }
  let seg = STORY[segIdx];
  if (charIdx === 0 && !currentTarget && seg.kind !== "pause") {
    startSegment(seg);
    // pause segments auto-advance segIdx in startSegment
    if (segIdx >= STORY.length || STORY[segIdx] !== seg) return;
  } else if (charIdx === 0 && seg.kind === "pause") {
    startSegment(seg);
    return;
  }

  const text = seg.text;
  const remaining = text.length - charIdx;
  const toEmit = Math.min(n, remaining);

  if (currentTarget && currentTarget._isCode) {
    charIdx += toEmit;
    currentTarget.innerHTML = highlightCode(text.slice(0, charIdx));
  } else if (currentTarget) {
    const chunk = text.slice(charIdx, charIdx + toEmit);
    charIdx += toEmit;
    currentTarget.appendChild(document.createTextNode(chunk));
  }

  emittedTokens += approxTokenCount(text.slice(charIdx - toEmit, charIdx));

  if (charIdx >= text.length) {
    if (postSegmentPauseSecs > 0) {
      pauseUntil = performance.now() + (postSegmentPauseSecs / speed) * 1000;
      postSegmentPauseSecs = 0;
    }
    segIdx++;
    charIdx = 0;
    currentTarget = null;
    currentKind = null;
  }

  output.scrollTop = output.scrollHeight;
}

function frame(now) {
  raf = null;
  if (!playing || done) return;
  if (now < pauseUntil) {
    raf = requestAnimationFrame(frame);
    return;
  }
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  let seg = STORY[segIdx];
  if (!seg) {
    markDone();
    return;
  }
  if (seg.kind === "pause" || seg.kind === "todo") {
    if (charIdx === 0) startSegment(seg);
    raf = requestAnimationFrame(frame);
    return;
  }
  const tokensPerSec = (BASE_RATES[seg.kind] || 30) * speed;
  const charsPerSec = tokensPerSec / TOKENS_PER_CHAR;

  charAccumulator += Math.min(dt, 0.1) * charsPerSec;
  let chars = Math.floor(charAccumulator);
  if (chars > 0) {
    charAccumulator -= chars;
    if (chars > 6000) chars = 6000;
    typeChars(chars);
    updateProgress();
  }
  raf = requestAnimationFrame(frame);
}

function startPlayback() {
  if (done) clearOutput();
  playing = true;
  playBtn.textContent = "❚❚ pause";
  lastTime = performance.now();
  if (!raf) raf = requestAnimationFrame(frame);
}

function pausePlayback() {
  playing = false;
  playBtn.textContent = "▶ play";
}

playBtn.addEventListener("click", () => {
  if (playing) pausePlayback();
  else startPlayback();
});

restartBtn.addEventListener("click", () => {
  pausePlayback();
  clearOutput();
  playBtn.textContent = "▶ play";
});

skipBtn.addEventListener("click", () => {
  pauseUntil = 0;
});

rateSlider.addEventListener("input", (e) => {
  speed = parseFloat(e.target.value);
  rateNum.textContent = speed.toFixed(2) + "×";
});

window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === " ") { e.preventDefault(); playBtn.click(); }
  else if (e.key === "r") { restartBtn.click(); }
  else if (e.key === "s") { skipBtn.click(); }
  else if (e.key === "+" || e.key === "=") {
    speed = Math.min(4, speed * 1.25);
    rateSlider.value = speed;
    rateNum.textContent = speed.toFixed(2) + "×";
  } else if (e.key === "-") {
    speed = Math.max(0.25, speed / 1.25);
    rateSlider.value = speed;
    rateNum.textContent = speed.toFixed(2) + "×";
  }
});

rateSlider.value = speed;
rateNum.textContent = speed.toFixed(2) + "×";

// autostart — begin streaming as soon as the page is ready
window.addEventListener("load", () => {
  if (!playing && !done) startPlayback();
});
// in case 'load' already fired (cached), start on next tick
requestAnimationFrame(() => { if (!playing && !done) startPlayback(); });
</script>
